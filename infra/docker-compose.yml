version: '3.8'

services:
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_MASTRA_BASE_URL=http://backend:3001
    depends_on:
      - backend

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - FRONTEND_URL=http://frontend:5173
    depends_on:
      - sandbox

  sandbox:
    build:
      context: ../sandbox
      dockerfile: Dockerfile
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ../sandbox:/app
      - /var/run/docker.sock:/var/run/docker.sock

